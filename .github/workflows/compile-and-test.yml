name: CMP Compile and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Generate Empty BuildConfig for Build Verification
      run: |
        mkdir -p composeApp/build/generated/config/src/commonMain/kotlin/com/gujaratifitness/app/core/network
        echo "package com.gujaratifitness.app.core.network" > composeApp/build/generated/config/src/commonMain/kotlin/com/gujaratifitness/app/core/network/BuildConfig.kt
        echo "object BuildConfig {" >> composeApp/build/generated/config/src/commonMain/kotlin/com/gujaratifitness/app/core/network/BuildConfig.kt
        echo "    const val SUPABASE_URL = \"https://placeholder.supabase.co\"" >> composeApp/build/generated/config/src/commonMain/kotlin/com/gujaratifitness/app/core/network/BuildConfig.kt
        echo "    const val SUPABASE_ANON_KEY = \"placeholder_key\"" >> composeApp/build/generated/config/src/commonMain/kotlin/com/gujaratifitness/app/core/network/BuildConfig.kt
        echo "}" >> composeApp/build/generated/config/src/commonMain/kotlin/com/gujaratifitness/app/core/network/BuildConfig.kt

    - name: Verify Kotlin Compilation
      run: ./gradlew compileKotlinMetadata

    - name: Run Unit Tests
      run: ./gradlew test
